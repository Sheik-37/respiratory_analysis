{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center position-relative" style="min-height: 80vh; z-index: 1;">
    <div class="position-absolute top-50 start-50 translate-middle" style="width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(0,242,254,0.05) 0%, transparent 50%); z-index: -1; pointer-events: none;"></div>

    <div class="col-md-7 col-lg-5">
        <div class="card p-4 p-md-5 border-0" style="background: rgba(21, 30, 50, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 0 1px rgba(0, 242, 254, 0.15); transition: transform 0.3s ease, box-shadow 0.3s ease;">
            <div class="text-center mb-5">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4 position-relative" style="width: 90px; height: 90px; background: rgba(0, 242, 254, 0.05); border: 1px solid rgba(0, 242, 254, 0.3); box-shadow: 0 0 30px rgba(0, 242, 254, 0.15);">
                    <div class="position-absolute w-100 h-100 rounded-circle spin-ring" style="border: 1px dashed rgba(0,242,254,0.4);"></div>
                    <i class="fas fa-user-shield fa-3x" style="color: var(--accent-cyan); filter: drop-shadow(0 0 10px rgba(0,242,254,0.6));"></i>
                </div>
                <h2 class="fw-bolder mb-2" style="color: var(--text-main); letter-spacing: -0.5px;">Clinical Authorization</h2>
                <p class="small text-uppercase mb-0" style="color: var(--text-dim); letter-spacing: 2.5px; font-size: 0.75rem;">Secure Telemetry Portal</p>
            </div>
            
            <form method="POST" action="{{ url_for('admin_login') }}">
                <div class="mb-4 position-relative">
                    <label for="username" class="form-label fw-bold small text-uppercase mb-2" style="color: var(--accent-cyan); letter-spacing: 1.5px; font-size: 0.75rem;">Staff ID / Identity</label>
                    <div class="input-group" style="border-radius: 12px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);">
                        <span class="input-group-text border-0" style="background: rgba(0,0,0,0.4); color: var(--text-dim); padding-left: 1.2rem;"><i class="fas fa-id-badge"></i></span>
                        <input type="text" class="form-control border-0 py-3 text-white focus-glow" id="username" name="username" placeholder="Enter Credentials" required style="background: rgba(0,0,0,0.4); box-shadow: none;">
                    </div>
                </div>
                
                <div class="mb-5 position-relative">
                    <label for="password" class="form-label fw-bold small text-uppercase mb-2" style="color: var(--accent-cyan); letter-spacing: 1.5px; font-size: 0.75rem;">Decryption Key</label>
                    <div class="input-group" style="border-radius: 12px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);">
                        <span class="input-group-text border-0" style="background: rgba(0,0,0,0.4); color: var(--text-dim); padding-left: 1.2rem;"><i class="fas fa-fingerprint"></i></span>
                        <input type="password" class="form-control border-0 py-3 text-white focus-glow" id="password" name="password" placeholder="••••••••" required style="background: rgba(0,0,0,0.4); box-shadow: none; letter-spacing: 4px;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold text-uppercase d-flex align-items-center justify-content-center gap-2" style="letter-spacing: 1.5px; font-size: 0.95rem; border: none;">
                    Initiate Handshake <i class="fas fa-shield-alt"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<style>
    .spin-ring {
        animation: spinCustom 12s linear infinite;
    }
    
    @keyframes spinCustom {
        100% { transform: rotate(360deg); }
    }

    .focus-glow:focus {
        background: rgba(0, 0, 0, 0.6) !important;
        outline: none;
    }
    
    .input-group:focus-within {
        border-color: rgba(0, 242, 254, 0.4) !important;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px rgba(0, 242, 254, 0.1) !important;
    }
    
    .input-group:focus-within .input-group-text {
        color: var(--accent-cyan) !important;
    }
    
    .card:hover {
        box-shadow: 0 40px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 0 1px rgba(0, 242, 254, 0.3) !important;
        transform: translateY(-2px);
    }
</style>
{% endblock %}
